<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charles Visuals – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <!-- Google Sign-In SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* Your full existing styles – no changes needed here */
    :root { --yellow: #ffcc00; --orange: #ff9900; --dark: #0a0a0a; --gray: #161616; --light: #d4d4d4; --border: rgba(255, 204, 0, 0.18); --glass: rgba(22, 22, 22, 0.45); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(10,10,10,0.9), rgba(10,10,10,0.85)), url('https://images.unsplash.com/photo-1557672172-298e090bd0f1?auto=format&fit=crop&w=2000&q=80') center/cover; }
    .container { width: 100%; max-width: 420px; padding: 2.5rem; background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); }
    .logo { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--yellow); text-align: center; margin-bottom: 1.8rem; text-decoration: none; }
    h2 { text-align: center; margin-bottom: 2rem; font-size: 1.8rem; }
    .form-group { margin-bottom: 1.5rem; position: relative; }
    label { display: block; margin-bottom: 0.6rem; font-size: 0.95rem; color: var(--light); }
    input { width: 100%; padding: 0.95rem 1.2rem; padding-right: 3.5rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 1rem; transition: all 0.3s; }
    input:focus { outline: none; border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(255,204,0,0.15); }
    .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-10%); cursor: pointer; color: var(--light); font-size: 1.2rem; }
    .error-message { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.4rem; display: none; }
    .success-message { color: #4ade80; font-size: 0.95rem; margin-top: 0.8rem; text-align: center; display: none; }
    .options { display: flex; justify-content: space-between; align-items: center; margin: 1.2rem 0; font-size: 0.9rem; }
    .remember { display: flex; align-items: center; gap: 0.5rem; color: var(--light); }
    .forgot { color: var(--yellow); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }
    .btn-login { width: 100%; padding: 1rem; background: var(--yellow); color: black; font-size: 1.1rem; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s; }
    .btn-login:hover { background: var(--orange); transform: translateY(-2px); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .social-login { margin: 2rem 0; text-align: center; }
    .social-btn { width: 100%; padding: 0.9rem; margin: 0.6rem 0; border: 1px solid var(--border); border-radius: 50px; background: transparent; color: white; font-weight: 500; cursor: pointer; transition: all 0.3s; }
    .social-btn:hover { background: rgba(255,204,0,0.1); border-color: var(--yellow); }
    .g_id_signin { margin: 1rem auto; display: block; }
    .toggle { text-align: center; margin-top: 1.5rem; color: var(--light); }
    .toggle a { color: var(--yellow); text-decoration: none; font-weight: 500; }
    .toggle a:hover { text-decoration: underline; }
    @media (max-width: 480px) { .container { padding: 2rem 1.5rem; margin: 1rem; } }
  </style>
</head>
<body>

<div class="container">
  <a href="index.html" class="logo">Charles Visuals</a>
  <h2>Welcome Back</h2>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="hello@charlesvisuals.com" required autocomplete="email">
      <div class="error-message" id="emailError">Please enter a valid email</div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      <span class="password-toggle" id="togglePassword">👁️</span>
      <div class="error-message" id="passwordError">Password is required</div>
    </div>

    <div class="options">
      <label class="remember">
        <input type="checkbox" id="remember"> Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <div class="success-message" id="successMsg"></div>

    <button type="submit" class="btn-login" id="loginBtn">Login</button>
  </form>

  <div class="social-login">
    <div id="g_id_onload"
         data-client_id="268401463653-2oir9cpmlit4pat69bgfv72k1d3hcf62.apps.googleusercontent.com"
         data-callback="handleGoogleSignIn"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="continue_with"
         data-shape="rectangular"
         data-logo_alignment="left">
    </div>

    <button class="social-btn">Continue with Apple</button>
  </div>

  <div class="toggle">
    Don't have an account? <a href="register.html">Sign Up</a>
  </div>
</div>

<!-- WhatsApp button -->
<a href="https://wa.me/1234567890?text=Hi%20Charles%20Visuals!" class="whatsapp-float" style="position:fixed;bottom:30px;right:30px;background:#25D366;width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 25px rgba(0,0,0,0.4);z-index:999;">
  <svg viewBox="0 0 24 24" width="38" height="38" fill="white">
    <path d="M12 2C6.48 2 2 6.48 2 12c0 2.42.71 4.68 1.93 6.58L2 22l3.42-1.93C7.32 21.29 9.58 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm3.78 14.38c-.24.67-.47 1.2-1.06 1.34-.6.14-1.27-.11-2.12-.44-.85-.33-1.6-.7-2.3-1.2-.7-.5-1.32-1.08-1.85-1.75-.53-.67-.95-1.45-1.25-2.32-.3-.87-.13-1.58.5-2.05.63-.47 1.4-.7 2.3-.7.9 0 1.8.23 2.6.7.8.47 1.48 1.15 2 2 .52.85.78 1.75.78 2.7 0 .95-.26 1.88-.8 2.72z"/>
  </svg>
</a>

<script>
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const togglePassword = document.getElementById('togglePassword');
  const emailError = document.getElementById('emailError');
  const passwordError = document.getElementById('passwordError');
  const successMsg = document.getElementById('successMsg');
  const loginBtn = document.getElementById('loginBtn');

  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
  });

  emailInput.addEventListener('input', () => emailError.style.display = 'none');
  passwordInput.addEventListener('input', () => passwordError.style.display = 'none');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    emailError.style.display = 'none';
    passwordError.style.display = 'none';
    successMsg.style.display = 'none';

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    let valid = true;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailError.textContent = "Please enter a valid email";
      emailError.style.display = 'block';
      valid = false;
    }

    if (!password) {
      passwordError.textContent = "Password is required";
      passwordError.style.display = 'block';
      valid = false;
    }

    if (!valid) return;

    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    try {
      const response = await fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Login failed');
      }

      // Save token
      localStorage.setItem('authToken', data.token);
      if (document.getElementById('remember').checked) {
        localStorage.setItem('rememberMe', 'true');
      }

      // Check if user is admin and redirect accordingly
      const isAdmin = data.user.is_admin === 1 || data.user.is_admin === true;

      successMsg.textContent = 'Login successful! Redirecting...';
      successMsg.style.display = 'block';

      setTimeout(() => {
        if (isAdmin) {
          window.location.href = 'admin.html';  // Admins go to approval page
        } else {
          window.location.href = 'rent.html';   // Regular users go to rentals
        }
      }, 1000);

    } catch (err) {
      passwordError.textContent = err.message || 'Something went wrong';
      passwordError.style.display = 'block';
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  });

  // Google Sign-In Callback (unchanged)
  function handleGoogleSignIn(response) {
    const idToken = response.credential;

    const successMsg = document.getElementById('successMsg');
    successMsg.textContent = 'Verifying Google account...';
    successMsg.style.display = 'block';
    successMsg.style.color = '#4ade80';

    fetch('http://localhost:3000/api/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: idToken })
    })
    .then(res => res.json())
    .then(data => {
      if (data.token) {
        localStorage.setItem('authToken', data.token);
        successMsg.textContent = 'Google login successful! Redirecting...';
        setTimeout(() => {
          // Optional: check is_admin from Google response if you add it
          window.location.href = 'rent.html'; // For now, Google users go to rentals
        }, 1500);
      } else {
        successMsg.style.color = '#ff6b6b';
        successMsg.textContent = 'Google login failed: ' + (data.error || 'Unknown error');
      }
    })
    .catch(err => {
      console.error(err);
      successMsg.style.color = '#ff6b6b';
      successMsg.textContent = 'Something went wrong with Google login';
    });
  }
</script>

</body>
</html>
